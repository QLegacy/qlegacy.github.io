<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Technodemo by QUADLEGACY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --accent: #00d4ff;
    --accent2: #ff6b00;
    --accent3: #00ff88;
    --bg: #000408;
    --panel-bg: rgba(0, 8, 20, 0.92);
    --border: rgba(0, 212, 255, 0.25);
    --text: #a8d8ea;
    --text-dim: rgba(168, 216, 234, 0.45);
    --glow: 0 0 20px rgba(0, 212, 255, 0.4);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    cursor: crosshair;
  }

  /* ── CANVAS слои ─────────────────────────────────────── */
  #starfield { position: fixed; inset: 0; z-index: 0; }
  #nebula    { position: fixed; inset: 0; z-index: 1; pointer-events: none; }
  #grid-overlay { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
  #main-canvas  { position: fixed; inset: 0; z-index: 3; }

  /* ── оверлей линии скана ─────────────────────────────────── */
  #scanlines {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 212, 255, 0.015) 2px,
      rgba(0, 212, 255, 0.015) 4px
    );
  }

  /* ── верхний HUD ───────────────────────────────────────────── */
  #hud-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    height: 56px;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 28px;
    background: linear-gradient(180deg, rgba(0,8,20,0.95) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .hud-logo {
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 900;
    letter-spacing: 8px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent), 0 0 40px rgba(0,212,255,0.3);
  }
  .hud-logo span { color: rgba(0,212,255,0.4); font-weight: 400; }
  .hud-stats {
    display: flex; gap: 32px; align-items: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 2px;
  }
  .hud-stat { display: flex; flex-direction: column; align-items: flex-end; }
  .hud-stat-label { color: var(--accent); font-size: 9px; margin-bottom: 2px; }
  .hud-stat-val { color: var(--text); font-size: 12px; }

  /* ── СПИДометр ───────────────────────────────────── */
  #speed-control {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    display: flex; align-items: center; gap: 16px;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    padding: 12px 24px; border-radius: 2px;
    backdrop-filter: blur(20px);
    box-shadow: var(--glow), inset 0 1px 0 rgba(0,212,255,0.1);
  }
  .speed-btn {
    background: none; border: 1px solid var(--border);
    color: var(--accent); font-family: 'Share Tech Mono', monospace;
    font-size: 14px; padding: 6px 14px; cursor: pointer;
    transition: all 0.2s; border-radius: 1px;
    letter-spacing: 1px;
  }
  .speed-btn:hover { background: rgba(0,212,255,0.1); box-shadow: var(--glow); }
  .speed-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px; color: var(--text-dim);
    letter-spacing: 3px; text-transform: uppercase;
    min-width: 80px; text-align: center;
  }
  #speed-val {
    font-family: 'Orbitron', monospace; font-size: 16px;
    color: var(--accent); min-width: 40px; text-align: center;
    text-shadow: 0 0 10px var(--accent);
  }

  /* ── инфо ─────────────────────────────────────────── */
  #info-panel {
    position: fixed; right: -460px; top: 56px; bottom: 0;
    width: 440px; z-index: 25;
    background: var(--panel-bg);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(30px);
    transition: right 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  #info-panel.open { right: 0; }

  .panel-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative;
  }
  .panel-close {
    position: absolute; right: 20px; top: 20px;
    background: none; border: 1px solid var(--border);
    color: var(--text-dim); width: 28px; height: 28px;
    cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; border-radius: 1px;
    font-family: monospace;
  }
  .panel-close:hover { color: var(--accent); border-color: var(--accent); box-shadow: var(--glow); }

  .planet-designation {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--accent); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .planet-name {
    font-family: 'Orbitron', monospace;
    font-size: 28px; font-weight: 700;
    color: #fff; letter-spacing: 4px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }
  .planet-type {
    font-size: 13px; color: var(--text-dim);
    letter-spacing: 2px; margin-top: 4px;
    font-weight: 300;
  }

  .panel-body {
    flex: 1; overflow-y: auto; padding: 20px 28px;
    scrollbar-width: thin;
    scrollbar-color: rgba(0,212,255,0.3) transparent;
  }
  .panel-body::-webkit-scrollbar { width: 3px; }
  .panel-body::-webkit-scrollbar-track { background: transparent; }
  .panel-body::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.3); border-radius: 2px; }

  .data-section { margin-bottom: 24px; }
  .data-section-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: var(--accent); letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .data-section-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--border), transparent);
  }

  .data-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0; border-bottom: 1px solid rgba(0,212,255,0.06);
  }
  .data-key {
    font-size: 11px; color: var(--text-dim); letter-spacing: 1px;
    font-weight: 300;
  }
  .data-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--text); text-align: right;
    max-width: 60%;
  }
  .data-val.highlight { color: var(--accent); text-shadow: 0 0 8px rgba(0,212,255,0.5); }

  .fact-block {
    background: rgba(0,212,255,0.04);
    border: 1px solid rgba(0,212,255,0.12);
    border-left: 3px solid var(--accent);
    padding: 12px 14px; margin-bottom: 10px;
    border-radius: 0 2px 2px 0;
  }
  .fact-block p {
    font-size: 13px; color: var(--text); line-height: 1.6;
    font-weight: 300;
  }

  /* атмосфера */
  .atmo-bar {
    display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
  }
  .atmo-label { font-size: 11px; color: var(--text-dim); width: 90px; flex-shrink: 0; letter-spacing: 1px; }
  .atmo-track {
    flex: 1; height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .atmo-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease; }
  .atmo-pct { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); width: 36px; text-align: right; }

  /* превью планетв */
  #planet-preview {
    width: 100%; height: 180px;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
    margin-bottom: 4px;
  }
  #preview-planet {
    width: 100px; height: 100px; border-radius: 50%;
    position: relative; z-index: 2;
  }
  #preview-glow {
    position: absolute; border-radius: 50%;
    filter: blur(30px); z-index: 1;
  }

  /* ── планеты ───────────────────────────────────────── */
  #legend {
    position: fixed; left: 24px; bottom: 32px;
    z-index: 20;
    background: var(--panel-bg);
    border: 1px solid var(--border);
    padding: 14px 18px;
    backdrop-filter: blur(20px);
    min-width: 170px;
  }
  .legend-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; color: var(--accent); letter-spacing: 4px;
    margin-bottom: 12px; text-transform: uppercase;
  }
  .legend-item {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 7px; cursor: pointer; opacity: 0.7;
    transition: opacity 0.2s;
  }
  .legend-item:hover { opacity: 1; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend-name {
    font-size: 12px; color: var(--text);
    letter-spacing: 1px; font-weight: 500;
  }

  /* ── подсказка зума ──────────────────────────────────────────── */
  #hint {
    position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
    z-index: 20;
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--text-dim); letter-spacing: 3px;
    pointer-events: none;
    animation: fadeHint 4s ease forwards;
  }
  @keyframes fadeHint { 0%,60%{opacity:1} 100%{opacity:0} }

  /* ── линия ─────────────────────────────────────── */
  #connector-svg {
    position: fixed; inset: 0; z-index: 18; pointer-events: none;
  }

  /* ── загрузка ────────────────────────────────────────────── */
  #loader {
    position: fixed; inset: 0; z-index: 100;
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 20px; transition: opacity 0.8s;
  }
  .loader-text {
    font-family: 'Orbitron', monospace; font-size: 14px;
    color: var(--accent); letter-spacing: 8px;
    text-shadow: 0 0 20px var(--accent);
  }
  .loader-bar {
    width: 300px; height: 2px; background: rgba(0,212,255,0.1);
    overflow: hidden;
  }
  .loader-fill {
    height: 100%; background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: loadFill 1.5s ease forwards;
  }
  @keyframes loadFill { from{width:0} to{width:100%} }
  .loader-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px; color: var(--text-dim); letter-spacing: 4px;
  }
  #main-canvas {
  transition: filter 0.5s ease;
  }
  #start-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}
.play-btn {
  padding: 20px 60px; font-family: 'Orbitron', sans-serif;
  font-size: 24px; cursor: pointer;
  background: transparent; border: 2px solid var(--accent);
  color: var(--accent); transition: 0.3s;
}
.play-btn:hover { background: var(--accent); color: var(--bg); }
</style>
</head>
<body>
<div id="start-overlay">
  <button class="play-btn" id="start-btn">Запустить</button>
</div>
<!-- слои -->
<canvas id="starfield"></canvas>
<canvas id="nebula"></canvas>
<canvas id="grid-overlay"></canvas>
<canvas id="main-canvas"></canvas>
<div id="scanlines"></div>

<!-- свг конектор -->

<!-- интерфейс -->

    <div class="hud-stat">
      <div class="hud-stat-label">VIEW MODE</div>
      <div class="hud-stat-val" id="hud-mode">ORBITAL</div>

  </div>
</div>

<!-- инфо -->
<div id="info-panel">

    <button class="panel-close" id="panel-close">✕</button>

  <div id="planet-preview">

  <div class="panel-body" id="panel-body"></div>
</div>

<!-- СПИДометр -->
<div id="speed-control">

  <button class="speed-btn" id="speed-down">◀◀</button>
  <div id="speed-val">1x</div>
  <button class="speed-btn" id="speed-up">▶▶</button>
  <button class="speed-btn" id="pause-btn">⏸</button>
</div>

<!-- стата -->
<div id="legend">

  <div id="legend-items"></div>
</div>

<!-- подсказка -->
<div id="hint">[ CLICK PLANET TO FOCUS — SCROLL TO ZOOM ]</div>

<!-- загрузка -->
<div id="loader">

    gridCtx.beginPath(); gridCtx.moveTo(0, y); gridCtx.lineTo(W, y); gridCtx.stroke();
  }
}

let camDist = 0;    // Удаление камеры от центра
// Настрйоки перспективы

const FOV = 600;

function project(x, y, z) {
  // Сдвигаем мир так, чтобы центр (0,0,0,) был в центре экрана
  let tx = x;
  let ty = y;
  let tz = z;

  // Поворот по Y (влево-вправо)
  let rx = tx * Math.cos(camRotY) + tz * Math.sin(camRotY);
  let rz1 = -tx * Math.sin(camRotY) + tz * Math.cos(camRotY);
  
  // Поворот по X (вверх-вниз)
  let ry = ty * Math.cos(camRotX) - rz1 * Math.sin(camRotX);
  let rz = ty * Math.sin(camRotX) + rz1 * Math.cos(camRotX);
  
  const scale = FOV / (FOV + rz);
  return {
    sx: CX + rx * scale,
    sy: CY + ry * scale,
    scale,
    depth: rz
  };
}

// ════════════════════════════════════════════════
//  Солнце
// ════════════════════════════════════════════════
function drawSun(obj, t) {
  const sunProj = project(0, 0, 0); // Солнце всегда в центре мира
  const sx = sunProj.sx, sy = sunProj.sy;
  const sunR = 32 * zoom;
  const pulse = 1 + 0.04 * Math.sin(t * 2.3);
  const corona = 1 + 0.06 * Math.sin(t * 1.7);

  // Кольца
  for (let i = 3; i > 0; i--) {
    const g = ctx.createRadialGradient(sx, sy, sunR * 0.8, sx, sy, sunR * (2 + i * 0.8) * corona);
    g.addColorStop(0, `rgba(255,140,0,${0.08/i})`);
    g.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sx, sy, sunR * (2 + i * 0.8) * corona, 0, Math.PI * 2); ctx.fill();
  }

  // Солнечные всплески
  for (let i = 0; i < 6; i++) {
    const angle = t * 0.3 + (i / 6) * Math.PI * 2;
    const len = sunR * (1.2 + 0.4 * Math.sin(t * 1.1 + i));
    const x2 = sx + Math.cos(angle) * len * 2.2;
    const y2 = sy + Math.sin(angle) * len * 1.4;
    const g = ctx.createLinearGradient(sx, sy, x2, y2);
    g.addColorStop(0, 'rgba(255,160,0,0.15)');
    g.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.strokeStyle = g;
    ctx.lineWidth = sunR * 0.25;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(x2, y2); ctx.stroke();
  }

  // Главное свещение
  const g1 = ctx.createRadialGradient(sx, sy, 0, sx, sy, sunR * 2.5 * pulse);
  g1.addColorStop(0, 'rgba(255,220,120,0.9)');
  g1.addColorStop(0.3, 'rgba(255,160,40,0.5)');
  g1.addColorStop(0.6, 'rgba(255,80,0,0.2)');
  g1.addColorStop(1, 'rgba(255,40,0,0)');
  ctx.fillStyle = g1;
  ctx.beginPath(); ctx.arc(sx, sy, sunR * 2.5 * pulse, 0, Math.PI * 2); ctx.fill();

  // Тело солнца
  const g2 = ctx.createRadialGradient(sx - sunR*0.3, sy - sunR*0.3, 0, sx, sy, sunR * pulse);
  g2.addColorStop(0, '#fff7c0');
  g2.addColorStop(0.3, '#ffcc44');
  g2.addColorStop(0.7, '#ff8800');
  g2.addColorStop(1, '#cc3300');
  ctx.fillStyle = g2;
  ctx.beginPath(); ctx.arc(sx, sy, sunR * pulse, 0, Math.PI * 2); ctx.fill();

  // Отражений эффект?
  ctx.save();
  ctx.globalAlpha = 0.12;
  for (let i = 0; i < 8; i++) {
    const angle = (i/8) * Math.PI * 2 + t * 0.1;
    const r = sunR * 0.6;
    const gx = sx + Math.cos(angle) * r * 0.5;
    const gy = sy + Math.sin(angle) * r * 0.4;
    const gg = ctx.createRadialGradient(gx, gy, 0, gx, gy, sunR * 0.35);
    gg.addColorStop(0, '#ffee88');
    gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg;
    ctx.beginPath(); ctx.arc(gx, gy, sunR * 0.35, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

// ════════════════════════════════════════════════
//  Рисуем орбиту
// ════════════════════════════════════════════════
function drawOrbit(planet, hovered) {
  const r = planet.orbitRadius * zoom;
  const steps = 200;
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const a = (i / steps) * Math.PI * 2;
    const ox = Math.cos(a) * r;
    const oy = Math.sin(a) * r;
    const p = project(ox, 0, oy);
    if (i === 0) ctx.moveTo(p.sx, p.sy);
    else ctx.lineTo(p.sx, p.sy);
  }
  ctx.closePath();
  if (hovered) {
    ctx.strokeStyle = planet.glowColor + 'cc';
    ctx.lineWidth = 2;
    ctx.shadowColor = planet.glowColor;
    ctx.shadowBlur = 12;
  } else {
    ctx.strokeStyle = 'rgba(0,212,255,0.12)';
    ctx.lineWidth = 1;
    ctx.shadowBlur = 0;
  }
  ctx.stroke();
  ctx.restore();
}

// ════════════════════════════════════════════════
//  рисуем планету
// ════════════════════════════════════════════════
function drawPlanet(planet, angle, t) {
  const r = planet.orbitRadius * zoom;
  const px3d = Math.cos(angle) * r;
  const pz3d = Math.sin(angle) * r;
  const proj = project(px3d, 0, pz3d);
  
  // если Math.max(0, ...) отрицательным, приложению будет капут, поэтому делаем чтобы радиус никогда не был отрицательным
  const pr = Math.max(0, planet.radius * zoom * PLANET_SCALE * proj.scale);
  
  const hovered = hoveredPlanet === planet;
  const selected = selectedPlanet === planet;

  planet._screenX = proj.sx;
  planet._screenY = proj.sy;
  planet._screenR = pr;
  planet._depth = proj.depth;

  // Свечение атмосферы
  const glowSize = pr * (hovered ? 3.2 : 2.4);
  const glowAlpha = selected ? 0.6 : (hovered ? 0.5 : 0.3);
  
  // Защита для градиентов
  const atmoG = ctx.createRadialGradient(proj.sx, proj.sy, Math.max(0, pr * 0.7), proj.sx, proj.sy, Math.max(0, glowSize));
  atmoG.addColorStop(0, planet.glowColor + Math.round(glowAlpha * 255).toString(16).padStart(2,'0'));
  atmoG.addColorStop(1, planet.glowColor + '00');
  ctx.fillStyle = atmoG;
  ctx.beginPath(); 
  ctx.arc(proj.sx, proj.sy, Math.max(0, glowSize), 0, Math.PI * 2); 
  ctx.fill();

  // Кольца сатурна
  if (planet.rings && proj.depth < 0) {
    drawSaturnRings(planet, proj, pr, t, 'back');
  }

  const bodyG = ctx.createRadialGradient(
    proj.sx - pr * 0.3, proj.sy - pr * 0.3, Math.max(0, pr * 0.1),
    proj.sx, proj.sy, Math.max(0, pr)
  );
  if (planet.id === 4) { // юпитера
    bodyG.addColorStop(0,   '#e8c97a');
    bodyG.addColorStop(0.2, '#c4893a');
    bodyG.addColorStop(0.4, '#e0b870');
    bodyG.addColorStop(0.6, '#a06030');
    bodyG.addColorStop(0.8, '#d4a060');
    bodyG.addColorStop(1,   '#8a5020');
  } else if (planet.id === 5) { // сатурн
    bodyG.addColorStop(0, '#f5dfa0');
    bodyG.addColorStop(0.4, '#e4c27a');
    bodyG.addColorStop(0.8, '#c4a050');
    bodyG.addColorStop(1, '#9a7030');
  } else if (planet.id === 2) { // земля
    bodyG.addColorStop(0, '#88d4ff');
    bodyG.addColorStop(0.3, '#3a8acc');
    bodyG.addColorStop(0.6, '#1a5a9a');
    bodyG.addColorStop(1, '#0a3060');
  } else {
    const c = hexToRgb(planet.color);
    bodyG.addColorStop(0, lighten(planet.color, 60));
    bodyG.addColorStop(0.4, planet.color);
    bodyG.addColorStop(1, darken(planet.color, 60));
  }

  ctx.beginPath();
  ctx.arc(proj.sx, proj.sy, Math.max(0, pr), 0, Math.PI * 2); // фикс слоёв
  ctx.fillStyle = bodyG;
  ctx.fill();

  // оверлей колец юпитера
  if (planet.id === 4 && pr > 4) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, pr, 0, Math.PI * 2);
    ctx.clip();
    const bandCount = 7;
    for (let i = 0; i < bandCount; i++) {
      const by = proj.sy - pr + (i / bandCount) * pr * 2;
      const bh = (pr * 2) / bandCount;
      const ba = i % 2 === 0 ? 0.08 : 0.04;
      ctx.fillStyle = i % 2 === 0 ? `rgba(160,80,30,${ba})` : `rgba(220,180,100,${ba})`;
      ctx.fillRect(proj.sx - pr, by, pr * 2, bh);
    }
    // GRS
    ctx.beginPath();
    ctx.ellipse(proj.sx + pr*0.15, proj.sy + pr*0.15, pr*0.3, pr*0.18, 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(180,60,30,0.35)';
    ctx.fill();
    ctx.restore();
  }

  // континенты земли (недетальные, что бы не перегрузить устройство)
  if (planet.id === 2 && pr > 4) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, pr, 0, Math.PI * 2);
    ctx.clip();
    const continents = [
      { dx: -0.2, dy: -0.1, rx: 0.4, ry: 0.3, angle: 0.3 },
      { dx: 0.25, dy: 0.1, rx: 0.25, ry: 0.35, angle: -0.2 },
      { dx: -0.1, dy: 0.35, rx: 0.3, ry: 0.2, angle: 0.5 },
    ];
    continents.forEach(c => {
      ctx.beginPath();
      ctx.ellipse(proj.sx + c.dx*pr, proj.sy + c.dy*pr, c.rx*pr, c.ry*pr, c.angle, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(34,120,34,0.55)';
      ctx.fill();
    });
    ctx.restore();
  }

  // свещение
  ctx.save();
  ctx.beginPath();
  ctx.arc(proj.sx, proj.sy, pr, 0, Math.PI * 2);
  ctx.clip();
  const shadowG = ctx.createRadialGradient(
    proj.sx + pr * 0.5, proj.sy + pr * 0.2, 0,
    proj.sx + pr * 0.5, proj.sy, pr * 1.5
  );
  shadowG.addColorStop(0, 'rgba(0,0,0,0)');
  shadowG.addColorStop(0.5, 'rgba(0,0,0,0.3)');
  shadowG.addColorStop(1, 'rgba(0,0,0,0.75)');
  ctx.fillStyle = shadowG;
  ctx.fillRect(proj.sx - pr, proj.sy - pr, pr * 2, pr * 2);
  ctx.restore();

  // Кольца сатурна спереди
  if (planet.rings && proj.depth >= 0) {
    drawSaturnRings(planet, proj, pr, t, 'front');
  }

  // Кольца при наведении
  if (hovered || selected) {
    ctx.beginPath();
    ctx.arc(proj.sx, proj.sy, pr + 4, 0, Math.PI * 2);
    ctx.strokeStyle = selected ? planet.glowColor + 'ff' : planet.glowColor + 'aa';
    ctx.lineWidth = selected ? 2 : 1.5;
    ctx.shadowColor = planet.glowColor;
    ctx.shadowBlur = 15;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // Имена планет
  if (zoom > 0.6 && pr > 3) {
    ctx.fillStyle = hovered ? '#ffffff' : 'rgba(168,216,234,0.6)';
    ctx.font = `${Math.max(10, 11*zoom)}px Rajdhani, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(planet.name.toUpperCase(), proj.sx, proj.sy + pr + 16);
  }
}
// С этой частью мне помог ИИ, не обоссыте плиз
function drawSaturnRings(planet, proj, pr, t, side) {
  ctx.save();
  const rings = [
    { inner: 1.3, outer: 1.6, color: 'rgba(200,180,120,0.35)' },
    { inner: 1.65, outer: 1.95, color: 'rgba(220,200,150,0.5)' },
    { inner: 2.0, outer: 2.3, color: 'rgba(180,160,100,0.3)' },
    { inner: 2.35, outer: 2.55, color: 'rgba(200,180,120,0.2)' },
  ];
  rings.forEach(ring => {
    const ry_inner = (ring.inner * pr) * Math.abs(Math.sin(currentTilt));
    const ry_outer = (ring.outer * pr) * Math.abs(Math.sin(currentTilt));
    // outer ring
    ctx.beginPath();
    ctx.ellipse(proj.sx, proj.sy, ring.outer * pr, ry_outer, 0, 0, Math.PI * 2);
    ctx.fillStyle = ring.color;
    ctx.fill();
    // inner cutout
    ctx.beginPath();
    ctx.ellipse(proj.sx, proj.sy, ring.inner * pr, ry_inner, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0)';
    // Use composite to carve
    if (side === 'back') {
      ctx.globalCompositeOperation = 'destination-out';
    }
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  });
  ctx.restore();
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function lighten(hex, amt) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.min(255,r+amt)},${Math.min(255,g+amt)},${Math.min(255,b+amt)})`;
}
function darken(hex, amt) {
  const {r,g,b} = hexToRgb(hex);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

// ════════════════════════════════════════════════
//  панель инфы
// ════════════════════════════════════════════════
function openPanel(planet) {
  document.getElementById('p-designation').textContent = planet.designation;
  document.getElementById('p-name').textContent = planet.name.toUpperCase();
  document.getElementById('p-type').textContent = planet.type;

  // превью\
  const prev = document.getElementById('preview-planet');
  const prevGlow = document.getElementById('preview-glow');
  prev.style.background = buildPlanetGradient(planet);
  prev.style.boxShadow = `0 0 30px ${planet.glowColor}88, 0 0 60px ${planet.glowColor}44`;
  prevGlow.style.width = '160px'; prevGlow.style.height = '160px';
  prevGlow.style.background = `radial-gradient(circle, ${planet.glowColor}44 0%, transparent 70%)`;

  const body = document.getElementById('panel-body');
  let html = '';

  // информация про планету и т.д.
  html += '<div class="data-section">';
  html += '<div class="data-section-title">ORBITAL DATA</div>';
  Object.entries(planet.data).forEach(([k, v]) => {
    html += `<div class="data-row"><span class="data-key">${k}</span><span class="data-val highlight">${v}</span></div>`;
  });
  html += '</div>';

  // атмос фера
  if (planet.atmosphere) {
    html += '<div class="data-section">';
    html += '<div class="data-section-title">ATMOSPHERE</div>';
    planet.atmosphere.forEach(a => {
      html += `<div class="atmo-bar">
        <span class="atmo-label">${a.name}</span>
        <div class="atmo-track"><div class="atmo-fill" style="width:${a.pct}%;background:${a.color};box-shadow:0 0 6px ${a.color}88"></div></div>
        <span class="atmo-pct">${a.pct}%</span>
      </div>`;
    });
    html += '</div>';
  }

  //факты
  html += '<div class="data-section">';
  html += '<div class="data-section-title">FIELD NOTES</div>';
  planet.facts.forEach(f => {
    html += `<div class="fact-block"><p>${f}</p></div>`;
  });
  html += '</div>';

  body.innerHTML = html;
  body.scrollTop = 0;
  document.getElementById('info-panel').classList.add('open');
  document.getElementById('hud-mode').textContent = 'FOCUSED';
}

function buildPlanetGradient(planet) {
  if (planet.id === 4) return 'radial-gradient(circle at 35% 35%, #f0d090, #c88030, #904020)';
  if (planet.id === 5) return 'radial-gradient(circle at 35% 35%, #f8e8b0, #e4c27a, #9a7030)';
  if (planet.id === 2) return 'radial-gradient(circle at 35% 35%, #88d4ff, #3a8acc, #0a3060)';
  return `radial-gradient(circle at 35% 35%, ${lighten(planet.color,60)}, ${planet.color}, ${darken(planet.color,60)})`;
}

function closePanel() {
  document.getElementById('info-panel').classList.remove('open');
  selectedPlanet = null;
  targetZoom = 1; targetViewX = 0; targetViewY = 0;
  document.getElementById('hud-mode').textContent = 'ORBITAL';
  updateConnector(null);
}

document.getElementById('panel-close').addEventListener('click', closePanel);

// ════════════════════════════════════════════════
//  взаимодействия
// ════════════════════════════════════════════════
mainCanvas.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;

  if (isDragging) { // ПКМ - сдвиг камеры (панорама)
    //сдвигаем центр экрана, если нужно
    CX += dx; CY += dy;
  } else if (isRotating) { // СКМ - вращение вокруг центра
    camRotY += dx * 0.01;
    camRotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, camRotX + dy * 0.01));
  }
  
  lastMouseX = e.clientX; lastMouseY = e.clientY;
  
  mouseX = e.clientX; mouseY = e.clientY;
  let found = null;
  PLANETS.forEach(p => {
    if (!p._screenX) return;
    const dx = mouseX - p._screenX, dy = mouseY - p._screenY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < p._screenR + 10) found = p;
  });
  hoveredPlanet = found;
  mainCanvas.style.cursor = found ? 'pointer' : 'crosshair';
});

mainCanvas.addEventListener('click', e => {
  if (hoveredPlanet) {
    selectedPlanet = hoveredPlanet;
    openPanel(selectedPlanet);
    // Fly to planet
    const r = selectedPlanet.orbitRadius * zoom;
    const angle = angles[selectedPlanet.id];
    const px3d = Math.cos(angle) * r;
    const pz3d = Math.sin(angle) * r;
    targetViewX = -px3d * 0.4;
    targetViewY = 0;
    targetZoom = Math.min(2.5, 1.8 - selectedPlanet.orbitRadius / 600);
  }
});
// Вращение системы на правую кнопку мыши
mainCanvas.addEventListener('mousedown', e => {
  if (e.button === 2) { // ПКМ - сдвиг
    isDragging = true;
  } else if (e.button === 1) { // СКМ - вращение
    isRotating = true;
  }
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
});

window.addEventListener('mouseup', () => { 
  isDragging = false; 
  isRotating = false; 
});

mainCanvas.addEventListener('mousemove', e => {
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;

  if (isDragging) {
    targetViewX += dx;
    targetViewY += dy;
  } else if (isRotating) {
    // Вращаем камеру по вертикали (изменяем наклон)
    currentTilt += dy * 0.005;
    // Ограничиваем наклон, чтобы не было визуальных глюков
    currentTilt = Math.max(-Math.PI/2, Math.min(Math.PI/2, currentTilt));
  }
  
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  
  // Логика наведений
  mouseX = e.clientX; mouseY = e.clientY;
  let found = null;
  PLANETS.forEach(p => {
    if (!p._screenX) return;
    const dx = mouseX - p._screenX, dy = mouseY - p._screenY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < p._screenR + 10) found = p;
  });
  hoveredPlanet = found;
  mainCanvas.style.cursor = found ? 'pointer' : 'crosshair';
});

// Отключаем стандартное контекстное меню на ПКМ
mainCanvas.addEventListener('contextmenu', e => e.preventDefault());
mainCanvas.addEventListener('wheel', e => {
  e.preventDefault();
  const zoomSpeed = 0.001;
  const delta = -e.deltaY * zoomSpeed;
  
  // Просто меняем зум, не трогая позицию, чтобы экран всегда масштабировался относительно центра (CX, CY)
  targetZoom = Math.max(0.3, Math.min(4, targetZoom + delta));
}, { passive: false });

// ── управление скоростью ─────────────────────────────
const speedSteps = [0.1, 0.25, 0.5, 1, 2, 5, 10, 50];
let speedIdx = 3;
document.getElementById('speed-up').onclick = () => { if (speedIdx < speedSteps.length-1) speedIdx++; updateSpeedUI(); };
document.getElementById('speed-down').onclick = () => { if (speedIdx > 0) speedIdx--; updateSpeedUI(); };
document.getElementById('pause-btn').onclick = () => {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? '▶' : '⏸';
};
function updateSpeedUI() {
  speedMult = speedSteps[speedIdx];
  const v = speedMult < 1 ? speedMult + 'x' : speedMult + 'x';
  document.getElementById('speed-val').textContent = v;
  document.getElementById('hud-speed').textContent = v;
}

// ── стата ─────────────────────────────────────
const legendEl = document.getElementById('legend-items');
PLANETS.forEach(p => {
  const el = document.createElement('div');
  el.className = 'legend-item';
  el.innerHTML = `<div class="legend-dot" style="background:${p.color};box-shadow:0 0 6px ${p.glowColor}"></div><span class="legend-name">${p.name.toUpperCase()}</span>`;
  el.onclick = () => {
    hoveredPlanet = p;
    selectedPlanet = p;
    openPanel(p);
    targetZoom = Math.min(2.5, 1.8 - p.orbitRadius/600);
    const r = p.orbitRadius;
    const a = angles[p.id];
    targetViewX = -Math.cos(a) * r * 0.4;
    targetViewY = 0;
  };
  legendEl.appendChild(el);
});

// ── часы ──────────────────────────────────────
function updateClock() {
  const now = new Date();
  const h = now.getHours().toString().padStart(2,'0');
  const m = now.getMinutes().toString().padStart(2,'0');
  const s = now.getSeconds().toString().padStart(2,'0');
  document.getElementById('sys-time').textContent = `${h}:${m}:${s}`;
}

// ════════════════════════════════════════════════
//  главная функция
// ════════════════════════════════════════════════
let lastTime = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  // Расчет близости к Солнцу
  const sunProj = project(0, 0, 0);
  const distToSun = Math.sqrt(Math.pow(sunProj.sx - CX, 2) + Math.pow(sunProj.sy - CY, 2));
  const threshold = 150 * zoom; 
  
  // Защита от деления на ноль или некорректных чисел
  let proximity = 0;
  if (threshold > 0) {
    proximity = Math.max(0, Math.min(1, 1 - (distToSun / threshold)));
  }

  // фильтр с проверкой
  if (isFinite(proximity)) {
    mainCanvas.style.filter = `sepia(${proximity * 0.5}) saturate(${1 + proximity * 2}) hue-rotate(-10deg)`;
    
    // Защита громкости: значение всегда должно быть от 0.1 до 0.5
    let vol = 0.1 + (proximity * 0.4);
    spaceSound.volume = Math.max(0, Math.min(1, vol));
  }

  if (!paused) {
    time += dt * speedMult;
    PLANETS.forEach((p, i) => angles[i] += p.speed * speedMult * 60 * dt);
  }

  zoom += (targetZoom - zoom) * 0.08;
  ctx.clearRect(0, 0, W, H);
  
  drawStars();
  
  // астероиды
  ctx.save();
  asteroids.forEach(ast => {
    if (!paused) {
      ast.angle += ast.speed * speedMult;
    }

    const r = ast.orbit * zoom;
    // 3D позиция с учетом высоты и наклона
    const ax = Math.cos(ast.angle) * r;
    const az = Math.sin(ast.angle) * r;
    const ay = (ast.y + Math.sin(ast.angle) * 20 * ast.tilt) * zoom;

    const p = project(ax, ay, az);

    // 1. ОПТИМИЗАЦИЯ: Не обрабатываем то, что вне экрана
    if (p.sx < -50 || p.sx > W + 50 || p.sy < -50 || p.sy > H + 50) return;

    // 2. ДИСТАНЦИОННОЕ СКРЫТИЕ:
    // видимость на основе глубины, и зума
    // чем дальше объект, тем меньше его прозрачность при отдалении
    const fadeStart = 400 * zoom; 
    const fadeEnd = 1200 / zoom;
    let visibility = 1.0;

    if (p.depth > fadeStart) {
        visibility = 1.0 - Math.min(1, (p.depth - fadeStart) / fadeEnd);
    }
    
    // Если слишком далеко - пропускаю отрисовку
    if (visibility <= 0) return;

    ctx.globalAlpha = visibility;
    ctx.fillStyle = '#8899aa';
    ctx.beginPath();
    // Размер тоже зависит от проекции и зума
    const finalSize = Math.max(0.2, ast.size * zoom * p.scale);
    ctx.arc(p.sx, p.sy, finalSize, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.restore();
  ctx.globalAlpha = 1.0;

  // Логика планет
  let objects = PLANETS.map((p, i) => {
    const r = p.orbitRadius * zoom;
    return { type: 'planet', planet: p, angle: angles[i], depth: project(Math.cos(angles[i])*r, 0, Math.sin(angles[i])*r).depth };
  });
  objects.push({ type: 'sun', depth: sunProj.depth });
  objects.sort((a, b) => b.depth - a.depth);

  objects.forEach(obj => {
    if (obj.type === 'sun') drawSun(obj, time);
    else {
      drawOrbit(obj.planet, hoveredPlanet === obj.planet);
      drawPlanet(obj.planet, obj.angle, time);
      if (obj.planet.moons) obj.planet.moons.forEach(m => drawSatellite(obj.planet, m, time));
    }
  });

  updateConnector(selectedPlanet); // Добавлено обновление коннектора
  updateClock();
  requestAnimationFrame(loop);
}

resize();

        { name: "Сатурн", facts: ["Кільця Сатурна складаються з мільярдів часток льоду та каменю різного розміру.", "Сатурн — найменш щільна планета; він міг би плавати у воді, якби знайшовся такий океан.", "Його супутник Титан — єдиний супутник із щільною атмосферою та рідкими озерами метану."] },
        { name: "Уран", facts: ["Уран нахилений на 98 градусів — він фактично обертається навколо Сонця «на боці».", "Це найхолодніша планетна атмосфера в системі, хоча він і не найвіддаленіший.", "Уран був першою планетою, яку відкрили за допомогою телескопа (у 1781 році)."] },
        { name: "Нептун", facts: ["На Нептуні зафіксовано найсильніші вітри в системі, швидкість яких до 2100 км/год.", "Тритон, його найбільший супутник, обертається у зворотному напрямку.", "Нептун був першою планетою, знайденою за допомогою математичних розрахунків."] }
    ]
};

async function initTranslation() {
    let lang = 'en';
    const browserLang = navigator.language || navigator.userLanguage;
    if (browserLang.startsWith('uk')) lang = 'uk';
    else if (browserLang.startsWith('ru')) lang = 'ru';
    try {
        const response = await fetch('https://ipapi.co/json/', { timeout: 2000 });
        if (response.ok) {
            const data = await response.json();
            if (data.country_code === 'UA') lang = 'uk';
            else if (['RU', 'BY', 'KZ', 'AM', 'GE'].includes(data.country_code)) lang = 'ru';
        }
    } catch (e) {
        console.log("GeoIP blocked or failed, keeping browser/default lang:", lang);
    }

    applyLanguage(lang);
    
    console.log(`[System] Interface localized to: ${lang.toUpperCase()}`);
}

function applyLanguage(l) {
    const t = translations[l];
    const pt = planetTranslations[l];

    document.querySelector('.hud-stat:nth-child(1) .hud-stat-label').textContent = t.sys_time;
    document.querySelector('.hud-stat:nth-child(2) .hud-stat-label').textContent = t.obj_count;
    document.querySelector('.hud-stat:nth-child(2) .hud-stat-val').textContent = `9 ${t.bodies}`;
    document.querySelector('.hud-stat:nth-child(3) .hud-stat-label').textContent = t.sim_speed;
    document.querySelector('.hud-stat:nth-child(4) .hud-stat-label').textContent = t.view_mode;
    document.querySelector('.speed-label').textContent = t.time_warp;
    document.querySelector('.loader-text').textContent = t.init_demo;
    document.querySelector('.loader-sub').textContent = t.loading_data;
    document.querySelector('#hint').textContent = t.hint;
    document.querySelector('#start-btn').textContent = t.start_btn;
    document.querySelector('.legend-title').textContent = `// ${t.bodies}`;

    PLANETS.forEach((p, i) => {
        p.name = pt[i].name;
        p.type = t.planet_types[p.type] || p.type;
        p.facts = pt[i].facts;
        
        const newData = {};
        for (let key in p.data) {
            const newKey = t.keys[key] || key;
            newData[newKey] = p.data[key];
        }
        p.data = newData;

        if (p.atmosphere) {
            p.atmosphere.forEach(a => {
                a.name = t.atmo_names[a.name] || a.name;
            });
        }
    });

    const legendItems = document.querySelectorAll('.legend-item .legend-name');
    legendItems.forEach((item, i) => {
        item.textContent = PLANETS[i].name.toUpperCase();
    });
    
    if (document.getElementById('hud-mode').textContent === 'ORBITAL') {
         document.getElementById('hud-mode').textContent = t.orbital;
    }
}

initTranslation();
</script>
